<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Site Under Construction</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  font-family: Arial, sans-serif;
  background: black;
}

/* Proper fullscreen background */
.video-container {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 177.77vh; /* 16:9 ratio */
  height: 100vh;
  transform: translate(-50%, -50%);
  pointer-events: none;
  z-index: -2;
}

.video-container iframe {
  width: 100%;
  height: 100%;
}

.overlay {
  position: fixed;
  width: 100%;
  height: 100%;
  background: linear-gradient(135deg, rgba(0,0,0,0.7), rgba(139,0,0,0.7));
  z-index: -1;
}

.content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  text-align: center;
  color: white;
}

h1 {
  font-size: 3rem;
  text-shadow: 0 0 20px red;
  letter-spacing: 2px;
}
</style>
</head>
<body>

<div class="video-container">
  <iframe
    src="https://www.youtube.com/embed/CMxsjHaCSBM?autoplay=1&mute=1&loop=1&playlist=CMxsjHaCSBM&controls=0&rel=0&modestbranding=1"
    frameborder="0"
    allow="autoplay; fullscreen"
    allowfullscreen>
  </iframe>
</div>

<div class="overlay"></div>

<div class="content">
  <h1>🚧 The Site Is Being Worked On 🚧</h1>
</div>

</body>
</html>
